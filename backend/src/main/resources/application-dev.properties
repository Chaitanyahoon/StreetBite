server.port=${PORT:${SERVER_PORT:8081}}

# Local development defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/streetbite?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Allow the seeded demo dataset and a fallback JWT secret only in dev.
streetbite.allow-insecure-defaults=${STREETBITE_ALLOW_INSECURE_DEFAULTS:true}
streetbite.seed.enabled=${STREETBITE_SEED_ENABLED:true}
