server.port=${PORT:${SERVER_PORT:8081}}
spring.application.name=streetbite-backend

# Geocoding is optional. Leave blank to disable remote geocoding calls.
google.geocoding.api.key=${GOOGLE_GEOCODING_API_KEY:${GOOGLE_MAPS_API_KEY:}}

# Firebase is optional and only used for realtime mirrors and push messaging.
firebase.credentials.path=${GOOGLE_APPLICATION_CREDENTIALS:./firebase-key.json}

# Cross-origin and cookie behavior for local development and Render/Vercel deployments.
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:4000}

# Base configuration is production-safe by default. Use the dev profile for local defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:0}

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
# Default to update so managed hosting can recover from additive schema changes automatically.
# Override with SPRING_JPA_HIBERNATE_DDL_AUTO=validate once migrations are fully stabilized.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Explicitly gate all unsafe development conveniences behind opt-in properties.
streetbite.allow-insecure-defaults=${STREETBITE_ALLOW_INSECURE_DEFAULTS:false}
streetbite.seed.enabled=${STREETBITE_SEED_ENABLED:false}

spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

# Auth mail is delivered through EmailJS.
emailjs.service.id=${EMAILJS_SERVICE_ID:}
emailjs.public.key=${EMAILJS_PUBLIC_KEY:}
emailjs.private.key=${EMAILJS_PRIVATE_KEY:}
emailjs.template.id.auth=${EMAILJS_TEMPLATE_ID_AUTH:}
emailjs.template.id.password-reset=${EMAILJS_TEMPLATE_ID_PASSWORD_RESET:}

logging.level.com.streetbite=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.transaction=${LOG_LEVEL_TX:INFO}
logging.level.org.springframework.orm.jpa=${LOG_LEVEL_JPA:INFO}
logging.level.org.hibernate.resource.transaction=${LOG_LEVEL_HIBERNATE_TX:INFO}
